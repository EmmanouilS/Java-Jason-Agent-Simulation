# Multi-Agent Environment Configuration
# =====================================

# Simulation Settings
simulation.delay=200
simulation.grid_size=9
simulation.max_moves=31
simulation.obstacles=4

# Agent Settings
agent.move_cost=0.01
agent.comm_cost=0.001
agent.wait_time=40

# Dynamic Environment
environment.dynamic_obstacles=true
environment.obstacle_spawn_chance=5
environment.goal_respawn_chance=3
environment.max_dynamic_obstacles=2

# GUI Settings
gui.show_paths=true
gui.show_rewards=true
gui.show_statistics=true
gui.control_panel=true

# Performance
performance.track_metrics=true
performance.log_level=INFO
performance.save_logs=true

# Advanced Features
features.conflict_resolution=true
features.strategic_waiting=true
features.performance_monitoring=true
features.dynamic_environment=true
